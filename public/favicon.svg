<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36" fill="none">
  <!-- Dark background -->
  <rect width="36" height="36" rx="8" fill="#0b0f0d"/>

  <!-- Outer ring -->
  <circle cx="18" cy="18" r="15" stroke="#c9a227" stroke-width="1.5" opacity="0.6"/>
  <!-- Middle ring -->
  <circle cx="18" cy="18" r="9" stroke="#c9a227" stroke-width="1" opacity="0.5"/>
  <!-- Bullseye -->
  <circle cx="18" cy="18" r="4.5" fill="#9b2335" opacity="0.9"/>
  <!-- Center dot -->
  <circle cx="18" cy="18" r="1.8" fill="#f0e8d0"/>

  <!-- Dart shaft -->
  <line x1="31" y1="5" x2="18" y2="18" stroke="#c9a227" stroke-width="2" stroke-linecap="round"/>
  <!-- Dart tip -->
  <polygon points="31,5 27.5,7.5 29.5,3.5" fill="#c9a227"/>
</svg>
